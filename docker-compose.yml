#
# Immich Docker Compose — Self-hosted Photo & Video Management
# Repository: https://github.com/WOOWTECH/Woow_immich_docker_compose_all
#
# Based on official Immich release with pgvector enabled.
# See: https://docs.immich.app/install/docker-compose/
#

name: immich

services:
  # ──────────────────────────────────────────────
  # Immich Server — Web UI, API, background jobs
  # ──────────────────────────────────────────────
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    # Hardware-accelerated transcoding (uncomment to enable):
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu  # options: nvenc, quicksync, rkmpp, vaapi, vaapi-wsl
    volumes:
      - ${UPLOAD_LOCATION:-./library}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '${IMMICH_PORT:-2283}:2283'
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    healthcheck:
      disable: false

  # ──────────────────────────────────────────────
  # Machine Learning — Face recognition, smart search, CLIP
  # ──────────────────────────────────────────────
  immich-machine-learning:
    container_name: immich_machine_learning
    # For GPU acceleration, append: -cuda, -rocm, -openvino, -armnn, -rknn
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    # Hardware-accelerated ML (uncomment to enable):
    # extends:
    #   file: hwaccel.ml.yml
    #   service: cpu  # options: armnn, cuda, rocm, openvino, openvino-wsl, rknn
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  # ──────────────────────────────────────────────
  # Redis (Valkey) — Job queue and caching
  # ──────────────────────────────────────────────
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9-alpine
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ──────────────────────────────────────────────
  # PostgreSQL — with pgvector + VectorChord extensions
  # ──────────────────────────────────────────────
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment if database is stored on HDD instead of SSD:
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      - ${DB_DATA_LOCATION:-./postgres}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      test: pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-postgres} || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  model-cache:
