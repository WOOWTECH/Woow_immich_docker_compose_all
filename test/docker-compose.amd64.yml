name: woow-immich-amd64
services:
  immich-amd64:
    image: woowtech/woow-immich:${VERSION:-latest}-amd64
    build:
      context: ..
      args:
        BUILD_ARCH: amd64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: woow-immich-amd64
    ports:
      - 8080:8080
    environment:
      - TZ=Asia/Taipei
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
      - media:/media
      - share:/share
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:8080/api/server/ping | jq -e '.res == \"pong\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  data:
  config:
  media:
  share:
